services:
  pqc-proxy:
    build:
      context: ./pqc-proxy
      dockerfile: Dockerfile
    ports:
      - "8443:8443"
    environment:
      PQC_PROXY_SERVER_PORT: "8443"
      PQC_PROXY_GATEWAY_URL: "http://gateway:8000"
      PQC_PROXY_LOG_LEVEL: "info"
      PQC_PROXY_LOG_FORMAT: "json"
    depends_on:
      gateway:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    expose:
      - "8000"
    environment:
      GATEWAY_HOST: "0.0.0.0"
      GATEWAY_PORT: "8000"
      DATABASE_URL: "postgresql+asyncpg://gateway:gateway@postgres:5432/gateway"
      REDIS_URL: "redis://redis:6379"
      LOG_LEVEL: "info"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: gateway
      POSTGRES_PASSWORD: gateway
      POSTGRES_DB: gateway
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gateway"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --save "" --appendonly no
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

networks:
  internal:
    driver: bridge

volumes:
  postgres_data:
